<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Pixel Office</title>
    <style>
        body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:monospace}
        .scene{width:900px;height:600px;background:#f5e6d3;border:8px solid #4a3728;position:relative;overflow:hidden}
        .floor{bottom:0;height:150px;background:#8b7355;position:absolute;width:100%}
        .lamp{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:100}
        .lamp-shade{width:60px;height:30px;background:#2a2a2a;border-radius:0 0 30px 30px;transition:0.3s}
        .lamp-shade.on{background:#fff8dc;box-shadow:0 0 40px #fff8dc}
        .light-beam{position:absolute;top:80px;left:50%;transform:translateX(-50%);width:200px;height:400px;background:linear-gradient(180deg,rgba(255,248,220,0.4),transparent);opacity:0;transition:0.3s;clip-path:polygon(30% 0%,70% 0%,100% 100%,0% 100%)}
        .light-beam.on{opacity:1}
        .desks{bottom:150px;display:flex;justify-content:space-around;position:absolute;width:100%;padding:0 20px}
        .desk{width:70px;height:50px;position:relative}
        .desk-top{height:12px;background:#a0522d;border-radius:2px}
        .desk-leg{width:8px;height:38px;background:#7a3e1f;position:absolute;bottom:0}
        .desk-leg.left{left:10px}.desk-leg.right{right:10px}
        .computer{bottom:50px;left:50%;transform:translateX(-50%);width:40px;height:30px;background:#333;position:absolute;border-radius:2px;display:none}
        .computer.active{display:block}
        .screen{width:36px;height:22px;background:#001100;margin:2px auto;border-radius:1px;display:flex;align-items:center;justify-content:center}
        .screen.working{background:#003300}
        .screen-text{color:#0f0;font-size:4px;animation:blink 0.5s infinite}
        @keyframes blink{0%,100%{opacity:0.8}50%{opacity:0.4}}
        .stand{width:10px;height:6px;background:#444;margin:0 auto}
        .coffee{position:absolute;bottom:52px;right:-5px;width:12px;height:10px;background:#fff;border-radius:0 0 2px 2px}
        .coffee::before{content:'';position:absolute;right:-4px;top:2px;width:4px;height:6px;border:2px solid #fff;border-left:none;border-radius:0 4px 4px 0}
        .coffee::after{content:'☕';position:absolute;top:-8px;font-size:6px}
        .notebook{position:absolute;bottom:52px;left:-10px;width:15px;height:18px;background:#fff;transform:rotate(-5deg)}
        .pen{position:absolute;bottom:60px;left:0;width:4px;height:20px;background:#ff6b35;transform:rotate(15deg)}
        .bed{position:absolute;bottom:80px;right:80px;width:120px;height:60px}
        .bed-frame{width:100%;height:20px;background:#8b4513;position:absolute;bottom:0;border-radius:2px}
        .bed-mattress{width:100%;height:30px;background:#fff;position:absolute;bottom:20px;border-radius:2px}
        .bed-pillow{position:absolute;right:5px;bottom:45px;width:25px;height:15px;background:#ddd;border-radius:3px}
        .bed-blanket{width:70%;height:25px;background:#4169e1;position:absolute;left:0;bottom:20px;border-radius:2px 0 0 2px}
        .char{position:absolute;bottom:150px;left:50%;transform:translateX(-50%);z-index:50;transition:0.5s}
        .head{width:24px;height:24px;background:#ffdab9;margin:0 auto;border-radius:4px;position:relative}
        .hair{position:absolute;top:-4px;left:-2px;width:28px;height:12px;background:#4a3728;border-radius:4px 4px 0 0}
        .eyes{display:flex;gap:6px;position:absolute;top:8px;left:50%;transform:translateX(-50%)}
        .eye{width:4px;height:4px;background:#333;border-radius:1px}
        .mouth{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:6px;height:2px;background:#d4a574}
        .torso{width:30px;height:20px;background:#5dade2;margin:0 auto;border-radius:2px;position:relative}
        .torso::before{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:#fff;border-radius:50%}
        .arms{position:absolute;top:25px;width:100%}
        .arm{width:8px;height:15px;background:#ffdab9;position:absolute;border-radius:2px}
        .arm.left{left:-5px;transform:rotate(20deg)}
        .arm.right{right:-5px;transform:rotate(-20deg)}
        .legs{display:flex;justify-content:center;gap:4px}
        .leg{width:10px;height:12px;background:#34495e;border-radius:0 0 2px 2px}
        .char.sleeping{transform:translateX(-50%) translateY(-30px)}
        .char.sleeping .head{transform:rotate(-90deg);transform-origin:center bottom;margin-top:10px}
        .char.sleeping .torso{height:15px;transform:scaleY(0.7)}
        .char.sleeping .arms,.char.sleeping .legs{display:none}
        .zzz{position:absolute;top:-25px;right:-25px;font-size:14px;color:#666;opacity:0}
        .char.sleeping .zzz{animation:zzz 2s infinite}
        @keyframes zzz{0%{opacity:0;transform:translate(0,0) scale(0.5)}50%{opacity:1}100%{opacity:0;transform:translate(25px,-25px) scale(1.2)}}
        .bar{position:fixed;top:20px;left:20px;background:rgba(0,0,0,0.85);padding:15px 20px;border-radius:4px;color:#fff;border:2px solid #444}
        .bar h3{color:#ffd700;margin:0 0 10px}
        .dot{width:10px;height:10px;border-radius:50%;background:#ff4444;display:inline-block;margin-right:8px}
        .dot.on{background:#0f0;box-shadow:0 0 10px #0f0;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
        .plant{position:absolute;top:60px;left:40px}
        .pot{width:20px;height:15px;background:#cd853f;position:absolute;bottom:0;border-radius:0 0 4px 4px}
        .leaf{position:absolute;bottom:15px;width:10px;height:15px;background:#228b22;border-radius:50% 50% 50% 50%}
        .leaf:nth-child(1){transform:rotate(-30deg);left:-8px}.leaf:nth-child(2){left:0}.leaf:nth-child(3){transform:rotate(30deg);left:8px}
        .clock{position:absolute;top:55px;left:100px;width:40px;height:40px;background:#fff;border:3px solid #333;border-radius:50%}
        .pic{position:absolute;top:55px;right:100px;width:50px;height:40px;background:#8b6914;border:3px solid #5a4a1a;border-radius:2px}
    </style>
</head>
<body>
<div class="bar"><h3>📍 AI 状态</h3><div><span class="dot" id="dot"></span><span id="txt">待机中</span></div><div style="margin-top:8px">任务: <span id="cnt">0</span></div></div>
<div class="scene">
<div class="plant"><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="pot"></div></div>
<div class="clock"></div>
<div class="pic"></div>
<div class="lamp"><div class="lamp-shade" id="lamp"></div></div>
<div class="light-beam" id="beam"></div>
<div class="desks">
<div class="desk"><div class="desk-top"></div><div class="desk-leg left"></div><div class="desk-leg right"></div><div class="computer active" id="comp"><div class="screen" id="scr"><span class="screen-text">AI</span></div><div class="stand"></div></div><div class="coffee"></div><div class="notebook"></div><div class="pen"></div></div>
<div class="desk"><div class="desk-top"></div><div class="desk-leg left"></div><div class="desk-leg right"></div></div>
<div class="desk"><div class="desk-top"></div><div class="desk-leg left"></div><div class="desk-leg right"></div></div>
<div class="desk"><div class="desk-top"></div><div class="desk-leg left"></div><div class="desk-leg right"></div></div>
</div>
<div class="bed"><div class="bed-frame"></div><div class="bed-mattress"></div><div class="bed-pillow"></div><div class="bed-blanket"></div></div>
<div class="char" id="char"><div class="head"><div class="hair"></div><div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="mouth"></div></div><div class="torso"></div><div class="arms"><div class="arm left"></div><div class="arm right"></div></div><div class="legs"><div class="leg"></div><div class="leg"></div></div><div class="zzz">Zzz...</div></div>
</div>
<script>
let working=false,tasks=0;
function setWork(w){
    working=w;
    document.getElementById('dot').className=w?'dot on':'dot';
    document.getElementById('txt').textContent=w?'工作中':'睡觉中';
    document.getElementById('lamp').className=w?'lamp-shade on':'lamp-shade';
    document.getElementById('beam').className=w?'light-beam on':'light-beam';
    document.getElementById('char').className=w?'char':'char sleeping';
    document.getElementById('scr').className=w?'screen working':'screen';
}
function addTask(){tasks++;document.getElementById('cnt').textContent=tasks;setWork(true)}
setWork(false);
</script>
</body>
</html>
